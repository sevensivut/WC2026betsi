<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC26 Veikkauskilpailu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────────── -->
<nav class="topbar">
  <div class="wrap topbar-inner">
    <div class="brand">
      <span class="ball">⚽</span>
      WC26 Veikkaus
      <span class="sub">Ryhmävaihe</span>
    </div>
    <div class="topbar-right">
      <span class="live-chip" id="liveChip" hidden>
        <span class="live-dot-anim"></span>LIVE
      </span>
      <span class="updated-pill" id="updatedPill">Ladataan…</span>
    </div>
  </div>
</nav>

<!-- ── HERO ───────────────────────────────────────────────── -->
<section class="hero" id="heroSection">
  <div class="wrap hero-inner">
    <div>
      <div class="eyebrow">FIFA World Cup 2026 · Ryhmävaihe · 13 pelaajaa</div>
      <h1 class="hero-title">Kuka osaa <span class="accent">lukea</span> peliä?</h1>
      <p class="hero-sub">Seuraa pisteitä, selaa veikkauksia ja katso kuka löi leikin poikki.</p>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressText">Ladataan…</div>
    </div>
    <div class="hero-board" id="heroBoard">
      <div class="board-label">Johdossa</div>
      <div class="board-name" id="leaderName">—</div>
      <div class="board-pts" id="leaderPts">—</div>
      <div class="board-foot">pistettä</div>
    </div>
  </div>
</section>

<!-- ── LIVE ALERT BANNER (shown when games are live) ──────── -->
<div class="live-banner" id="liveBanner" hidden>
  <div class="wrap live-banner-inner">
    <span class="live-dot-anim"></span>
    <strong id="liveBannerText">Ottelu käynnissä</strong>
    <span id="liveBannerSub" class="live-banner-sub"></span>
  </div>
</div>

<!-- ── TABS ───────────────────────────────────────────────── -->
<nav class="tabs-wrap">
  <div class="wrap tabs">
    <button class="tab active" data-tab="standings">Sarjataulukko</button>
    <button class="tab" data-tab="race">Pistekisa</button>
    <button class="tab" data-tab="matches">Ottelut</button>
    <button class="tab" data-tab="groups">Lohkot</button>
    <button class="tab" data-tab="awards">Palkinnot</button>
  </div>
</nav>

<!-- ── PANELS ─────────────────────────────────────────────── -->
<main class="wrap">
  <div id="tab-standings" class="tabpanel"></div>
  <div id="tab-race"      class="tabpanel" hidden></div>
  <div id="tab-matches"   class="tabpanel" hidden></div>
  <div id="tab-groups"    class="tabpanel" hidden></div>
  <div id="tab-awards"    class="tabpanel" hidden></div>
</main>

<footer class="site-footer">
  <div class="wrap">WC26 Veikkauskilpailu · Ryhmävaihe 2026 ⚽</div>
</footer>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
