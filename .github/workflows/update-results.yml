name: Update World Cup Results

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch scores (paginated)
        env:
          BZZOIRO_KEY: ${{ secrets.BZZOIRO_API_KEY }}
        run: python3 fetch_scores.py

      - name: Commit results.json if changed
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "wc2026-bot@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet \
            && echo "No changes — skipping commit." \
            || (git commit -m "scores: $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
