name: Update World Cup Results

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Fetch and process World Cup data
        env:
          BZZOIRO_KEY: ${{ secrets.BZZOIRO_API_KEY }}
        run: |
          # Fetch all World Cup matches
          curl -H "Authorization: Token $BZZOIRO_KEY" \
            "https://sports.bzzoiro.com/api/v2/events/?date_from=2026-06-11&date_to=2026-06-28&league_id=27" \
            -o raw_data.json
          
          # Process with jq and save to results.json
          cat raw_data.json | jq '{
            updated: (now | strftime("%Y-%m-%dT%H:%M:%S")),
            source: "Bzzoiro Sports Data",
            games: [.results[] | select(.home_score != null) | {
              home: .home_team,
              away: .away_team,
              homeScore: .home_score,
              awayScore: .away_score,
              status: (.status | if . == "ft" or . == "finished" then "FT" elif . == "inprogress" or . == "live" then "LIVE" else . end),
              group: .group_name,
              round: .round_number,
              date: .event_date
            }]
          }' > results.json
          
          echo "✅ Updated $(cat results.json | jq '.games | length') matches with scores"
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config.user.email "actions@github.com"
          git add results.json raw_data.json
          git commit -m "Update results $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
