name: Update World Cup Results

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Fetch World Cup data from Bzzoiro
        env:
          BZZOIRO_KEY: ${{ secrets.BZZOIRO_API_KEY }}
        run: |
          # Fetch matches from tournament start to today + 1 day
          # This ensures we get all played matches
          curl -H "Authorization: Token $BZZOIRO_KEY" \
            "https://sports.bzzoiro.com/api/v2/events/?date_from=2026-06-11&date_to=2026-06-28&league_id=27" \
            -o raw_data.json
          
          python3 << 'EOF'
          import json
          from datetime import datetime
          
          with open('raw_data.json', 'r') as f:
              data = json.load(f)
          
          games = []
          for match in data.get('results', []):
              home_score = match.get('home_score')
              away_score = match.get('away_score')
              
              # Include matches that have scores (played or live)
              if home_score is not None and away_score is not None:
                  status = match.get('status', 'notstarted')
                  
                  # Convert status to your format
                  if status in ['ft', 'finished']:
                      status_display = 'FT'
                  elif status in ['inprogress', '1h', '2h', 'ht', 'halftime', 'live']:
                      status_display = 'LIVE'
                  else:
                      status_display = status
                  
                  games.append({
                      'home': match.get('home_team'),
                      'away': match.get('away_team'),
                      'homeScore': home_score,
                      'awayScore': away_score,
                      'status': status_display,
                      'group': match.get('group_name', ''),
                      'round': match.get('round_number', 0),
                      'date': match.get('event_date', '')
                  })
          
          output = {
              'updated': datetime.now().isoformat(),
              'source': 'Bzzoiro Sports Data',
              'games': games
          }
          
          with open('results.json', 'w') as f:
              json.dump(output, f, indent=2)
          
          print(f"✅ Updated {len(games)} matches with scores")
          
          # Show which matches have scores
          if games:
              print("\n📊 Matches with scores:")
              for g in games[:10]:
                  print(f"  {g['home']} {g['homeScore']}-{g['awayScore']} {g['away']} ({g['status']})")
              if len(games) > 10:
                  print(f"  ... and {len(games) - 10} more")
          else:
              print("\n⚠️ No matches with scores found yet.")
              print("Matches will appear as they finish.")
          EOF
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results.json raw_data.json
          git commit -m "Update results $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
