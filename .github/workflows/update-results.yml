name: Update World Cup Results

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Fetch World Cup data from Bzzoiro
        env:
          BZZOIRO_KEY: ${{ secrets.BZZOIRO_API_KEY }}
        run: |
          curl -H "Authorization: Token $BZZOIRO_KEY" \
            "https://sports.bzzoiro.com/api/v2/events/?league_id=27&season_id=188" \
            -o raw_data.json
          
          python3 << 'EOF'
          import json
          from datetime import datetime
          
          with open('raw_data.json', 'r') as f:
              data = json.load(f)
          
          games = []
          for match in data.get('results', []):
              status = match.get('status', 'notstarted')
              if status in ['inprogress', 'halftime', 'ft', 'finished']:
                  home_score = match.get('home_score')
                  away_score = match.get('away_score')
                  
                  if home_score is not None and away_score is not None:
                      games.append({
                          'home': match.get('home_team'),
                          'away': match.get('away_team'),
                          'homeScore': home_score,
                          'awayScore': away_score,
                          'status': status,
                          'group': match.get('group_name', ''),
                          'round': match.get('round_number', 0)
                      })
          
          output = {
              'updated': datetime.now().isoformat(),
              'source': 'Bzzoiro Sports Data',
              'games': games
          }
          
          with open('results.json', 'w') as f:
              json.dump(output, f, indent=2)
          
          print(f"Updated {len(games)} matches")
          EOF
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results.json raw_data.json
          git commit -m "Update results $(date -u '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
